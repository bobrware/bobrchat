name: Lint

on:
  pull_request:
    branches:
      - main

jobs:
  alejandra:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@v13
      - name: alejandra check
        run: |
          CHANGED_NIX=$(git diff --name-only --diff-filter=d origin/main... | grep '\.nix$' || true)
          if [ -n "$CHANGED_NIX" ]; then
            echo "$CHANGED_NIX" | xargs nix develop -c alejandra --check
          else
            echo "No Nix files changed, skipping alejandra check."
          fi

  eslint:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@v13
      - name: Setup bun Cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            node-modules-${{ runner.os }}-
      - name: bun install
        run: nix develop -c bun install
      - name: lint
        run: |
          CHANGED=$(git diff --name-only --diff-filter=d origin/main... | grep -E '\.(js|mjs|cjs|ts|mts|cts|jsx|tsx|vue|svelte|astro)$' || true)
          if [ -n "$CHANGED" ]; then
            echo "$CHANGED" | xargs nix develop -c bun --bun eslint
          else
            echo "No lintable files changed, skipping eslint."
          fi
